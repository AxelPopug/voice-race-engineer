name: Agent Task
description: Small, testable task intended for a coding or research agent
title: "[TASK-ID] "
labels:
  - agent-ready
body:
  - type: input
    id: task_id
    attributes:
      label: Task ID
      placeholder: W1-02
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: One concrete behavior or research outcome.
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Task IDs or decisions that must be completed first.
      placeholder: W0-01
    validations:
      required: true

  - type: textarea
    id: ownership
    attributes:
      label: Write Zone / Ownership
      description: Files or modules this task may change.
    validations:
      required: true

  - type: textarea
    id: read_first
    attributes:
      label: Read First
      description: Relevant architecture, research, and planning documents.
      value: |
        - AGENTS.md
        - docs/plan/0002-agent-execution-plan.md
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Observable conditions required to complete the task.
      placeholder: |
        - [ ] New behavior is covered by tests
        - [ ] Full test suite passes
        - [ ] git diff --check passes
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      description: Explicitly excluded work to prevent task expansion.
    validations:
      required: true

  - type: textarea
    id: completion_report
    attributes:
      label: Required Completion Report
      value: |
        - Changed files
        - Tests and checks run
        - Assumptions made
        - Known limitations and follow-up tasks
    validations:
      required: true
